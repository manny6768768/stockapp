<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockApp{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    {% block stylesheets %}{% endblock %}
    {% block head %}{% endblock %}
</head>
<body>
    <div class="aurora" aria-hidden="true">
        <span class="blob blob-cyan"></span>
        <span class="blob blob-violet"></span>
        <span class="blob blob-emerald"></span>
        <span class="blob blob-gold"></span>
    </div>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}

    <footer>
        &copy; 2026 Financr — QQQ &amp; VIX Predictor
    </footer>


</body>
</html>
